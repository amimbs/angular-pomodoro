<div class="container">
  <div class="base-timer">
    <button
      class="base-timer__label"
      mat-fab
      color="warn"
      aria-label="Example icon button with a delete icon"
      (click)="toggleTimer()">
      {{ formatTimeLeft(timeLeft) }}
    </button>
    <mat-progress-bar
      mode="determinate"
      [value]="calculatePercentage()"
      color="warn"></mat-progress-bar>
  </div>
</div>
